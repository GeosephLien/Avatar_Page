<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metaverse Conference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="landing">
    <header class="topbar">
      <a class="brand" href="#">AVATAR CREATOR</a>
      <nav class="menu" aria-label="Main navigation">
        <a class="active" href="#">Realistic</a>
        <a href="#">Retro</a>
        <a href="#">Upload VRM</a>
      </nav>
      <a class="btn btn-top" href="#">My Avatars</a>
    </header>

    <section class="hero">
      <section class="hero-copy">
        <h1>
          We Create
          <span>Unique &amp; Custom</span>
          Characters
        </h1>
        <p class="desc">
          Customize style, colors, and details —
          <br />
          no two avatars look the same.
        </p>
        <a class="btn btn-primary" href="#">Create Your Own Style!</a>
      </section>

      <section class="hero-visual" aria-label="Creative hero visual">
        <div class="blob blob-a"></div>
        <div class="blob blob-b"></div>
        <div class="blob blob-c"></div>
        <img src="images/Yaya_Collection_print_v2.png" alt="Yaya collection character visual" />
      </section>
    </section>
  </main>
</body>
</html>
