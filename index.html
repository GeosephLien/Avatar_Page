<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metaverse Conference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="landing">
    <header class="topbar">
      <a class="brand" href="#">AVATAR CREATOR</a>
      <div class="top-actions">
        <a class="btn btn-top" href="#">Back to My Avatar</a>
        <div class="hamburger-wrap">
          <button class="hamburger-btn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="top-dropdown">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav id="top-dropdown" class="dropdown-menu" aria-label="Avatar options">
            <a href="#">Market Place</a>
            <a href="#">Realistic Avatar</a>
            <a href="#">Retro Avatar</a>
            <a href="#">Upload VRM</a>
          </nav>
        </div>
      </div>
    </header>

    <section class="hero">
      <section class="hero-copy">
        <h1>
          We Create
          <span>Unique &amp; Custom</span>
          Characters
        </h1>
        <p class="desc">
          Customize style, colors, and details —
          <br />
          no two avatars look the same.
        </p>
        <a class="btn btn-primary" href="#">Create Your Own Style!</a>
      </section>

      <section class="hero-visual" aria-label="Creative hero visual">
        <div class="blob blob-a"></div>
        <div class="blob blob-b"></div>
        <div class="blob blob-c"></div>
        <img src="images/Yaya_Collection_print_v2.png" alt="Yaya collection character visual" />
      </section>
    </section>
  </main>
  <script>
    (() => {
      const wrap = document.querySelector('.hamburger-wrap');
      if (!wrap) return;
      const btn = wrap.querySelector('.hamburger-btn');
      const menu = wrap.querySelector('.dropdown-menu');

      const closeMenu = () => {
        wrap.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      };

      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        const isOpen = wrap.classList.toggle('open');
        btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      document.addEventListener('click', (event) => {
        if (!wrap.contains(event.target)) closeMenu();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });

      menu.addEventListener('click', closeMenu);
    })();
  </script>
</body>
</html>
