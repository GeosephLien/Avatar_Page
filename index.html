<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metaverse Conference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="landing">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="images/VIVERSE_MainLogo_Digital_Primary_Gradient_Black.svg" alt="VIVERSE logo" />
        <span>VIVERSE AVATAR</span>
      </div>
      <div class="top-actions">
        <div class="hamburger-wrap">
          <button class="hamburger-btn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="top-dropdown">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav id="top-dropdown" class="dropdown-menu" aria-label="Avatar options">
            <a href="#">Market Place</a>
            <a href="#">Realistic Avatar</a>
            <a href="#">Retro Avatar</a>
            <a href="#">Upload VRM</a>
            <a href="#">Back to My Avatar</a>
          </nav>
        </div>
      </div>
    </header>

    <section class="hero">
      <section class="hero-copy">
        <h1>
          <span class="title-main">Create Your Own</span>
          <span class="title-gradient" data-text="Unique Character">Unique Character</span>
        </h1>
        <p class="desc">
          Customize style, colors, and details — no two avatars look the same.
        </p>
        <a class="btn btn-primary" href="#">Start Creating!</a>
      </section>

      <section class="hero-visual" aria-label="Creative hero visual">
        <div class="blob blob-a"></div>
        <div class="blob blob-b"></div>
        <div class="blob blob-c"></div>
        <div class="hero-carousel" aria-live="polite">
          <img class="hero-slide is-active" src="images/Yaya_Collection_print_v2.png" alt="Yaya collection character visual" />
          <img class="hero-slide" src="images/Michael_print_Collection.png" alt="Michael collection character visual" />
          <img class="hero-slide" src="images/Iris.png" alt="Iris character visual" />
          <img class="hero-slide" src="images/ca2_suit_tb_01.png" alt="Suit character visual" />
        </div>
      </section>
    </section>
  </main>
  <script>
    (() => {
      const wrap = document.querySelector('.hamburger-wrap');
      if (!wrap) return;
      const btn = wrap.querySelector('.hamburger-btn');
      const menu = wrap.querySelector('.dropdown-menu');

      const closeMenu = () => {
        wrap.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      };

      btn.addEventListener('click', (event) => {
        event.stopPropagation();
        const isOpen = wrap.classList.toggle('open');
        btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      document.addEventListener('click', (event) => {
        if (!wrap.contains(event.target)) closeMenu();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeMenu();
      });

      menu.addEventListener('click', closeMenu);
    })();

    (() => {
      const slides = [...document.querySelectorAll('.hero-slide')];
      if (slides.length < 2) return;

      const intervalMs = 4000;
      let currentIndex = 0;

      setInterval(() => {
        const nextIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.remove('is-active');
        slides[nextIndex].classList.add('is-active');
        currentIndex = nextIndex;
      }, intervalMs);
    })();
  </script>
</body>
</html>
